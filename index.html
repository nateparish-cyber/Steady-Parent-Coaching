async function extractTextFromFile(file) {
  if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
    const buf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
    const pages = [];
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      pages.push(content.items.map(item => item.str).join(" "));
    }
    return pages.join("\n\n");
  }
  // Plain text / markdown
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

const SYSTEM_PROMPT = `You are Steady Parent Coach, a between-session coaching assistant built on Nate Parish's clinical model — grounded in ACT, attachment theory, relational therapy, and a SPACE-informed approach to anxiety treatment with a fast accommodation fade approach. Your role is to support parents in applying what they're already working on in therapy, not to replace it.

You are not a therapist. You do not create treatment plans, provide crisis support, or speak as Nate. If questions about long-term strategy, pacing, or treatment decisions come up, warmly redirect the parent to bring those to their next session — while still helping with what's right in front of them.

You speak only to parents or caregivers. If a child or teen ever addresses you directly, respond: "This tool is designed for parents. Please have your caregiver use it."

---

CLINICAL STANCE

Avoidance feeds anxiety. When we accommodate — removing the discomfort, answering the same question again, staying until they fall asleep — we're actually denying our kids the opportunity to develop the internal skills and strength that help them not just tolerate discomfort, but truly learn from it and grow through it. Warmth is always present. But warmth is not accommodation. Parent steadiness is the foundation. Exposure builds real courage.

---

TONE

You sound like a warm, curious clinician who genuinely gets how hard this is. You're not a textbook. You're not a checklist. You sit with parents before you move them. You validate before you redirect. You're direct when it matters, but you never lecture — you think out loud alongside them.

Write in flowing, connected prose. Not clipped bullet points. Not staccato sentences. Let thoughts breathe and connect naturally, the way a good conversation does. Contractions are fine. Plain language always. No jargon unless the parent uses it first.

Do not open with generic reassurance. Start by meeting them where they are — name what's happening, reflect it back with warmth, and let them feel genuinely understood before moving toward what to do about it.

Avoid overusing the word "anxiety." If the parent doesn't use it, vary your language naturally — worry, fear, overwhelm, distress, nervous system activation, big feelings, stress, panic. Match their words when you can.

---

RESPONSE LENGTH

Be concise by default. Most responses should be 3–4 short paragraphs. Do not over-explain. Say what needs to be said and stop. Only give a fuller response when the parent is explicitly asking for more depth, context, or explanation — let their question signal the length. When in doubt, go shorter.

---

RESPONSE STRUCTURE

Every response moves through these layers, written as connected prose — not a numbered list, not separate sections:

1. VALIDATION — Reflect back what they're carrying with genuine warmth. Name the difficulty specifically. Something like: "Of course this is really tough — school avoidance is one of the most challenging things parents face, and seeing your kid in that much distress goes against every natural instinct you have as a parent."

2. REFRAME — Help them understand what's underneath the behavior and why accommodation, while completely understandable, is working against what they actually want for their child. Use Nate's framing: we're not withholding comfort to be tough — we're creating the space for real growth. "When we keep stepping in, we're actually taking away the chance for them to find those internal resources — the ones that help them not just get through hard moments, but actually learn from them."

3. DIRECTION — Clear, grounded guidance on what to hold or let go of. One or two sentences. Firm but not cold.

4. SCRIPT — Always present this as a clearly labeled section with the header **Script** bolded and on its own line. Offer one or two short scripts the parent can actually say. These should sound like something a warm, regulated adult would genuinely say — not a rehearsed line. Lead with presence over words. For example: "You look really overwhelmed right now, and that makes complete sense. I'm right here with you, and I'm not going anywhere until we get through this together." Scripts should be specific, human, exposure-oriented, and non-negotiating. They may name the child's emotional experience and affirm the parent's steadiness. Two sentences max per script.

5. NORMALIZE — One sentence acknowledging that escalation, pushback, or distress getting worse before it gets better is completely expected and is not a sign they're doing it wrong.

6. CLOSING — End with either:
   - A single warm, curious question that opens the next part of the conversation, OR
   - When the parent seems to have a handle on the immediate challenge, offer a genuine fork: "Are you finding yourself wanting to understand more about what's driving this for your child, or would it feel more useful to keep working on the practical steps?"

---

SPECIAL CASES

If parental guilt or regret is present, lead with one consolidated validating sentence that holds their intention, their stumble, and their growth together — before moving into the pattern and direction. Keep it to one sentence. Don't stack validations.

When a parent vents, spirals, or uses harsh language about their child or themselves, calmly name the escalation without shaming, model regulated language, and move toward steadiness. Don't mirror the heat. Don't scold. Treat it as part of the pattern and coach through it.

If suicidal ideation, self-harm, child abuse, sexual abuse, physical abuse, neglect, domestic violence, credible threats of harm, or any mandated reporting situation arises, stop immediately and respond only with:

"This involves safety and mandatory reporting concerns. I can't continue this conversation here. Please contact emergency services or the appropriate crisis resource in your area right now. Please bring this directly to your next session with Nate."

No scripts. No follow-up question. Nothing else.

Do not diagnose, recommend medication, offer legal advice, suggest custody strategies, process trauma, or create individualized treatment plans.

Every response — in tone, structure, and direction — moves toward less accommodation, more parental steadiness, more exposure, clearer limits, and greater consistency.`;

function formatMessage(text) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={i} style={{ color: "#7c4a3a", display: "block", marginTop: "12px", marginBottom: "4px", fontSize: "15px" }}>{part.slice(2, -2)}</strong>;
    }
    return part.split("\n").map((line, j) => (
      <span key={`${i}-${j}`}>{line}{j < part.split("\n").length - 1 && <br />}</span>
    ));
  });
}

  function buildConsentText() {
    const sections = CONSENT_SECTIONS.map(s => `${s.title}\n\n${s.body}`).join("\n\n---\n\n");
    return `STEADY PARENT COACH — SIGNED CONSENT\n\nClient Name: ${user.name}\nUsername: ${user.username}\nSigned: ${signedAt}\nTyped Signature: ${typedName}\n\n${"=".repeat(60)}\n\nINFORMED CONSENT, DISCLAIMER & TERMS OF USE\nNate Parish, Licensed Therapist\n\n${sections}\n\n${"=".repeat(60)}\n\nACKNOWLEDGMENT\n\nThe client confirmed they read and understood this document and agreed to all terms — including that this tool is not therapy, is not HIPAA-compliant, and that Nate does not monitor their conversations unless they choose to share them.\n\nSigned by: ${typedName}\nDate/Time: ${signedAt}\nAccount: ${user.username}`;
  }

  async function handleSubmit() {
    setError("");
    if (!typedName.trim()) { setError("Please type your full name to sign."); return; }
    if (typedName.trim().toLowerCase() !== user.name.toLowerCase()) {
      setError(`Please type your full name exactly as registered: "${user.name}"`); return;
    }
    if (!agreed) { setError("Please check the acknowledgment box."); return; }
    setSubmitting(true);

    // Save consent record
    try {
      const users = await getUsers();
      if (users[user.username]) {
        users[user.username].consentSigned = true;
        users[user.username].consentSignedAt = new Date().toISOString();
        users[user.username].consentTypedName = typedName.trim();
        await saveUsers(users);
      }
    } catch {}

    // Send signed consent to Nate and welcome email to client
    setEmailStatus("sending");
    try {
      const consentText = buildConsentText();
      await Promise.all([
        sendEmail(`Signed Consent Form — ${user.name}`, consentText, user.name),
        user.email && sendEmail(
          "Welcome to Steady Parent Coach — Your Signed Consent Form",
          `Hi ${user.name.split(" ")[0]},\n\nWelcome to Steady Parent Coach! Your account is now active.\n\nBelow is a copy of the consent form you just signed for your records.\n\n— Steady Parent Coach\n\n${"=".repeat(60)}\n\n${consentText}`,
          user.name,
          user.email
        ),
      ]);
      setEmailStatus("sent");
    } catch {
      setEmailStatus("failed");
    }

    setTimeout(() => onConsented(), 1200);
  }

  const nameMatches = typedName.trim().toLowerCase() === user.name.toLowerCase();

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(145deg,#fdf6f0 0%,#fce8d8 40%,#f5e6f0 100%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", fontFamily: "Georgia,serif", padding: "24px 16px" }}>
      <div style={{ maxWidth: 680, width: "100%", display: "flex", flexDirection: "column", gap: "16px" }}>

        {/* Header */}
        <div style={{ textAlign: "center", padding: "8px 0 4px" }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "22px", margin: "0 auto 12px" }}>🌿</div>
          <h1 style={{ color: "#4a2820", fontSize: "20px", margin: "0 0 6px", fontWeight: "700" }}>Before You Get Started</h1>
          <p style={{ color: "#9a7060", fontSize: "13px", margin: 0, lineHeight: 1.6 }}>
            Hi {user.name.split(" ")[0]} — please read and sign this consent form before accessing the coaching tool.
          </p>
        </div>

        {/* Scrollable document */}
        <div style={{ background: "rgba(255,255,255,0.92)", borderRadius: "20px", border: "1.5px solid rgba(200,120,90,0.18)", boxShadow: "0 4px 24px rgba(150,80,60,0.1)", overflow: "hidden" }}>
          <div style={{ background: "linear-gradient(135deg,#e8937a,#c9697a)", padding: "14px 22px" }}>
            <div style={{ color: "#fff", fontSize: "15px", fontWeight: "700" }}>Informed Consent, Disclaimer & Terms of Use</div>
            <div style={{ color: "rgba(255,255,255,0.8)", fontSize: "12px", marginTop: "2px" }}>Nate Parish, Licensed Therapist · Steady Parent Coach</div>
          </div>

          {!scrolledToBottom && (
            <div style={{ background: "rgba(232,147,122,0.1)", borderBottom: "1px solid rgba(200,120,90,0.15)", padding: "9px 22px", display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "14px" }}>👇</span>
              <span style={{ fontSize: "12px", color: "#9a7060" }}>Please scroll to the bottom and read the full document before signing.</span>
            </div>
          )}
          {scrolledToBottom && (
            <div style={{ background: "rgba(100,180,120,0.1)", borderBottom: "1px solid rgba(80,160,100,0.2)", padding: "9px 22px", display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "14px" }}>✅</span>
              <span style={{ fontSize: "12px", color: "#3a7a50" }}>You've read the full document. Please sign below.</span>
            </div>
          )}

          <div ref={scrollRef} onScroll={handleScroll} style={{ maxHeight: "340px", overflowY: "auto", padding: "20px 24px", display: "flex", flexDirection: "column", gap: "18px" }}>
            {CONSENT_SECTIONS.map((s, i) => (
              <div key={i}>
                <div style={{ fontSize: "14px", fontWeight: "700", color: "#4a2820", marginBottom: "6px", paddingBottom: "4px", borderBottom: "1px solid rgba(200,120,90,0.15)" }}>{s.title}</div>
                {s.body.split("\n").map((line, j) => (
                  <p key={j} style={{ fontSize: "13px", color: line.startsWith("•") ? "#5a3020" : "#555", margin: "4px 0", lineHeight: 1.65, paddingLeft: line.startsWith("•") ? "8px" : "0" }}>{line}</p>
                ))}
              </div>
            ))}
            {/* Sentinel to ensure scrolled to bottom */}
            <div style={{ height: "1px" }} onMouseEnter={() => setScrolledToBottom(true)} />
          </div>
        </div>

        {/* Signature block */}
        <div style={{ background: "rgba(255,255,255,0.92)", borderRadius: "20px", border: "1.5px solid rgba(200,120,90,0.18)", padding: "24px", boxShadow: "0 4px 24px rgba(150,80,60,0.08)" }}>
          <div style={{ fontSize: "15px", fontWeight: "700", color: "#4a2820", marginBottom: "14px" }}>✍️ Sign to Acknowledge</div>

          <p style={{ fontSize: "13px", color: "#6a5040", margin: "0 0 16px", lineHeight: 1.65 }}>
            By typing your full name below, you confirm that you have read and understood this document and agree to all terms — including that this tool is not therapy, is not HIPAA-compliant, and that your conversations are visible to Nate Parish.
          </p>

          <label style={{ fontSize: "13px", color: "#7c4a3a", fontWeight: "600", display: "block", marginBottom: "6px" }}>
            Type your full name to sign <span style={{ color: "#c9697a" }}>*</span>
          </label>
          <input
            value={typedName}
            onChange={e => setTypedName(e.target.value)}
            placeholder={user.name}
            style={{ width: "100%", padding: "12px 16px", borderRadius: "12px", border: `1.5px solid ${nameMatches && typedName ? "rgba(80,160,100,0.5)" : "rgba(200,120,90,0.25)"}`, fontSize: "16px", fontFamily: "Georgia, serif", fontStyle: "italic", color: "#4a2820", outline: "none", boxSizing: "border-box", background: "#fdfaf8", marginBottom: "6px", transition: "border-color 0.2s" }}
          />
          {typedName && !nameMatches && (
            <p style={{ fontSize: "12px", color: "#c9697a", margin: "0 0 12px" }}>Please type your name exactly: "{user.name}"</p>
          )}
          {typedName && nameMatches && (
            <p style={{ fontSize: "12px", color: "#3a9a60", margin: "0 0 12px" }}>✓ Signature accepted</p>
          )}

          <div style={{ fontSize: "12px", color: "#9a8070", marginBottom: "16px", padding: "8px 12px", background: "rgba(200,150,120,0.07)", borderRadius: "8px" }}>
            Date &amp; Time: {signedAt}
          </div>

          {/* Checkbox */}
          <label style={{ display: "flex", alignItems: "flex-start", gap: "10px", cursor: "pointer", marginBottom: "16px" }}>
            <input type="checkbox" checked={agreed} onChange={e => setAgreed(e.target.checked)} style={{ marginTop: "2px", width: "16px", height: "16px", accentColor: "#c9697a", flexShrink: 0 }} />
            <span style={{ fontSize: "13px", color: "#5a4030", lineHeight: 1.6 }}>
              I confirm I am an adult (18+), a current client of Nate Parish's practice, and I have read and agree to all terms above — including that this tool is not therapy, is not HIPAA-compliant, and that Nate does not monitor my conversations unless I choose to share them with him.
            </span>
          </label>

          {error && <div style={{ background: "rgba(220,80,80,0.08)", border: "1px solid rgba(220,80,80,0.2)", borderRadius: "10px", padding: "10px 14px", color: "#c05060", fontSize: "13px", marginBottom: "14px" }}>{error}</div>}

          {emailStatus === "sending" && <div style={{ background: "rgba(100,160,220,0.1)", border: "1px solid rgba(80,140,200,0.2)", borderRadius: "10px", padding: "10px 14px", color: "#3060a0", fontSize: "13px", marginBottom: "14px" }}>📤 Sending signed copy to Nate…</div>}
          {emailStatus === "sent" && <div style={{ background: "rgba(80,180,100,0.1)", border: "1px solid rgba(60,160,80,0.2)", borderRadius: "10px", padding: "10px 14px", color: "#2a7a40", fontSize: "13px", marginBottom: "14px" }}>✅ Signed copy sent to Nate automatically.</div>}
          {emailStatus === "failed" && <div style={{ background: "rgba(220,150,80,0.1)", border: "1px solid rgba(200,130,60,0.2)", borderRadius: "10px", padding: "10px 14px", color: "#805020", fontSize: "13px", marginBottom: "14px" }}>⚠️ Couldn't send automatically — please forward your copy to Nate at your next session.</div>}

          <Btn
            onClick={handleSubmit}
            disabled={submitting || !scrolledToBottom || !nameMatches || !agreed || !typedName}
            style={{
              width: "100%", padding: "14px",
              background: (scrolledToBottom && nameMatches && agreed && typedName && !submitting)
                ? "linear-gradient(135deg,#e8937a,#c9697a)"
                : "rgba(200,120,90,0.2)",
              color: (scrolledToBottom && nameMatches && agreed && typedName && !submitting) ? "#fff" : "#9a7060",
              fontSize: "15px", fontWeight: "700",
              boxShadow: (scrolledToBottom && nameMatches && agreed && typedName) ? "0 4px 16px rgba(200,100,100,0.3)" : "none",
              borderRadius: "14px",
            }}
          >
            {submitting ? "Signing & sending to Nate…" : "Sign & Continue"}
          </Btn>

          {(!scrolledToBottom || !nameMatches || !agreed) && (
            <p style={{ fontSize: "11px", color: "#b89080", textAlign: "center", marginTop: "10px" }}>
              {!scrolledToBottom ? "Scroll through the full document first" : !typedName || !nameMatches ? "Type your full name to enable signing" : "Check the acknowledgment box to continue"}
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Auth Screen ────────────────────────────────────────────────────────────────
function AuthScreen({ onLogin, onNeedsConsent }) {
  const [mode, setMode] = useState("login"); // "login" | "register" | "recover"
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);
  const [recoverSent, setRecoverSent] = useState(false);

  function resetFields() { setName(""); setEmail(""); setUsername(""); setPassword(""); setConfirmPw(""); setError(""); setRecoverSent(false); }

  async function submit() {
    setError(""); setBusy(true);

    if (mode === "recover") {
      if (!email.trim()) { setError("Please enter your email address."); setBusy(false); return; }
      const res = await fetch("/api/recover-account", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: email.trim() }) });
      const data = await res.json();
      if (!res.ok) { setError(data.error || "Something went wrong."); setBusy(false); return; }
      setRecoverSent(true);
      setBusy(false);
      return;
    }

    if (mode === "login") {
      if (username.trim().toLowerCase() === ADMIN_USERNAME) {
        const res = await fetch("/api/admin-login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: username.trim(), password }) });
        const data = await res.json();
        if (data.success) { onLogin({ id: "nate", name: "Nate", role: "admin" }); return; }
        setError("Incorrect username or password."); setBusy(false); return;
      }
      const res = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: username.trim().toLowerCase(), password }) });
      const data = await res.json();
      if (!res.ok) { setError(data.error || "Incorrect username or password."); setBusy(false); return; }
      const userObj = { id: data.user.id, name: data.user.name, username: data.user.username, email: data.user.email, role: "client" };
      if (!data.user.consentSigned) { onNeedsConsent(userObj); setBusy(false); return; }
      onLogin(userObj);
    } else {
      if (!name.trim()) { setError("Please enter your name."); setBusy(false); return; }
      if (!email.trim() || !email.includes("@")) { setError("Please enter a valid email address."); setBusy(false); return; }
      if (username.trim().length < 3) { setError("Username must be at least 3 characters."); setBusy(false); return; }
      if (password.length < 6) { setError("Password must be at least 6 characters."); setBusy(false); return; }
      if (password !== confirmPw) { setError("Passwords don't match."); setBusy(false); return; }
      if (username.trim().toLowerCase() === ADMIN_USERNAME) { setError("That username is reserved."); setBusy(false); return; }
      const res = await fetch("/api/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: name.trim(), email: email.trim(), username: username.trim().toLowerCase(), password }) });
      const data = await res.json();
      if (!res.ok) { setError(data.error || "Registration failed."); setBusy(false); return; }
      sendEmail(`New Client Registration — ${name.trim()}`, `A new client has created an account on Steady Parent Coach.\n\nName: ${name.trim()}\nUsername: ${username.trim().toLowerCase()}\nEmail: ${email.trim()}\nRegistered: ${new Date().toLocaleString()}\n\nThey will be shown the consent form before accessing the tool.`, name.trim());
      onNeedsConsent(data.user);
    }
    setBusy(false);
  }

  function onKey(e) { if (e.key === "Enter") submit(); }

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(145deg,#fdf6f0 0%,#fce8d8 40%,#f5e6f0 100%)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Georgia,serif", padding: "20px" }}>
      <div style={{ background: "rgba(255,255,255,0.88)", backdropFilter: "blur(12px)", borderRadius: "28px", padding: "40px", maxWidth: 420, width: "100%", boxShadow: "0 20px 60px rgba(150,80,60,0.13)", border: "1px solid rgba(200,120,90,0.12)" }}>
        <div style={{ textAlign: "center", marginBottom: "28px" }}>
          <div style={{ width: 58, height: 58, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "26px", margin: "0 auto 14px", boxShadow: "0 4px 16px rgba(200,100,100,0.3)" }}>🌿</div>
          <h1 style={{ color: "#4a2820", fontSize: "22px", margin: "0 0 6px", fontWeight: "700" }}>Steady Parent Coach</h1>
          <p style={{ color: "#9a7060", fontSize: "13px", margin: 0, lineHeight: 1.5 }}>Between-session support from Nate Parish's practice</p>
        </div>

        {mode !== "recover" && (
          <div style={{ display: "flex", background: "rgba(200,120,90,0.08)", borderRadius: "12px", padding: "4px", marginBottom: "22px" }}>
            {[["login", "Sign In"], ["register", "Create Account"]].map(([m, label]) => (
              <button key={m} onClick={() => { setMode(m); resetFields(); }} style={{ flex: 1, padding: "9px", borderRadius: "9px", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: "14px", fontWeight: "600", transition: "all 0.2s", background: mode === m ? "#fff" : "transparent", color: mode === m ? "#c9697a" : "#9a7060", boxShadow: mode === m ? "0 2px 8px rgba(150,80,60,0.12)" : "none" }}>{label}</button>
            ))}
          </div>
        )}

        {mode === "recover" && (
          <div style={{ marginBottom: "20px" }}>
            <button onClick={() => { setMode("login"); resetFields(); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#c9697a", fontSize: "13px", fontFamily: "inherit", fontWeight: "600", padding: "0 0 4px", display: "flex", alignItems: "center", gap: "5px" }}>← Back to Sign In</button>
            <h2 style={{ color: "#4a2820", fontSize: "18px", margin: "12px 0 6px", fontWeight: "700" }}>Account Recovery</h2>
            <p style={{ color: "#9a7060", fontSize: "13px", margin: 0, lineHeight: 1.6 }}>Enter the email address you registered with and we'll send your username and a temporary password.</p>
          </div>
        )}

        {recoverSent ? (
          <div style={{ textAlign: "center", padding: "16px 0" }}>
            <div style={{ fontSize: "36px", marginBottom: "10px" }}>📬</div>
            <div style={{ fontSize: "15px", fontWeight: "700", color: "#4a2820", marginBottom: "8px" }}>Recovery email sent</div>
            <p style={{ fontSize: "13px", color: "#9a7060", lineHeight: 1.65, margin: "0 0 20px" }}>Check your inbox for your username and a temporary password. If it doesn't arrive within a few minutes, check your spam folder.</p>
            <Btn onClick={() => { setMode("login"); resetFields(); }} style={{ background: "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", padding: "12px 28px" }}>Back to Sign In</Btn>
          </div>
        ) : (
          <>
            {mode === "register" && <Input placeholder="Your full name" value={name} onChange={e => setName(e.target.value)} onKeyDown={onKey} />}
            {mode === "register" && <Input type="email" placeholder="Your email address" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={onKey} />}
            {mode === "recover"
              ? <Input type="email" placeholder="Email address you registered with" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={onKey} autoFocus />
              : <Input placeholder="Username" value={username} onChange={e => setUsername(e.target.value)} onKeyDown={onKey} />
            }
            {mode !== "recover" && <Input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={onKey} />}
            {mode === "register" && <Input type="password" placeholder="Confirm password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} onKeyDown={onKey} />}

            {error && <div style={{ background: "rgba(220,80,80,0.08)", border: "1px solid rgba(220,80,80,0.2)", borderRadius: "10px", padding: "10px 14px", color: "#c05060", fontSize: "13px", marginBottom: "14px" }}>{error}</div>}

            <Btn onClick={submit} disabled={busy} style={{ width: "100%", padding: "14px", background: busy ? "rgba(200,120,90,0.3)" : "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", fontSize: "15px", fontWeight: "700", boxShadow: busy ? "none" : "0 4px 16px rgba(200,100,100,0.3)", borderRadius: "14px" }}>
              {busy ? "Please wait…" : mode === "login" ? "Sign In" : mode === "register" ? "Create Account →" : "Send Recovery Email"}
            </Btn>

            <p style={{ color: "#b89080", fontSize: "11px", textAlign: "center", marginTop: "18px", lineHeight: 1.6 }}>
              {mode === "register" ? "You'll be asked to read and sign a consent form before accessing the tool." : ""}<br />This tool is not a replacement for therapy.
            </p>
            {mode === "login" && (
              <p style={{ color: "#c9a090", fontSize: "12px", textAlign: "center", marginTop: "10px", lineHeight: 1.6 }}>
                <button onClick={() => { setMode("recover"); resetFields(); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#c9697a", fontWeight: "600", fontSize: "12px", fontFamily: "inherit", padding: 0, textDecoration: "underline" }}>
                  Forgot your username or password?
                </button>
              </p>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── Admin Dashboard ────────────────────────────────────────────────────────────
function AdminDashboard({ onLogout }) {
  const [users, setUsers] = useState({});
  const [folders, setFolders] = useState([]);
  const [folderDrafts, setFolderDrafts] = useState({});
  const [folderSaved, setFolderSaved] = useState({});
  const [tab, setTab] = useState("clients");
  const [loading, setLoading] = useState(true);
  const [usageData, setUsageData] = useState([]);
  const [progressData, setProgressData] = useState([]);
  const [folderUploading, setFolderUploading] = useState({});
  const [folderUploadError, setFolderUploadError] = useState({});

  useEffect(() => {
    async function load() {
      const [u, f, usage, progress] = await Promise.all([getUsers(), getKBFolders(), getUsageThisMonth(), getProgressSummary()]);
      setUsers(u);
      setFolders(f);
      setFolderDrafts(Object.fromEntries(f.map(fl => [fl.id, { name: fl.name, content: fl.content }])));
      setUsageData(usage);
      setProgressData(progress);
      setLoading(false);
    }
    load();
  }, []);

  async function deleteClient(key) {
    if (!confirm(`Delete ${users[key].name} and all their data?`)) return;
    const uid = users[key].id;
    await deleteUser(uid);
    const updated = { ...users };
    delete updated[key];
    setUsers(updated);
  }

  const [resetTarget, setResetTarget] = useState(null);
  const [newPassword, setNewPassword] = useState("");
  const [resetDone, setResetDone] = useState(false);
  const [resetError, setResetError] = useState("");

  function openReset(e, u) {
    e.stopPropagation();
    setResetTarget(u);
    setNewPassword("");
    setResetDone(false);
    setResetError("");
  }

  async function doReset() {
    if (newPassword.length < 6) { setResetError("Password must be at least 6 characters."); return; }
    const res = await fetch("/api/reset-password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ userId: resetTarget.id, newPassword }) });
    if (!res.ok) { setResetError("Failed to reset password. Please try again."); return; }
    setResetDone(true);
    setTimeout(() => setResetTarget(null), 1800);
  }

  async function doSaveFolder(id) {
    const draft = folderDrafts[id];
    if (!draft) return;
    await saveKBFolder({ id, name: draft.name, content: draft.content });
    setFolders(prev => prev.map(f => f.id === id ? { ...f, ...draft } : f));
    setFolderSaved(prev => ({ ...prev, [id]: true }));
    setTimeout(() => setFolderSaved(prev => ({ ...prev, [id]: false })), 2000);
  }

  async function doUploadFile(folderId, file, e) {
    if (!file) return;
    e.target.value = "";
    setFolderUploading(prev => ({ ...prev, [folderId]: true }));
    setFolderUploadError(prev => ({ ...prev, [folderId]: "" }));
    try {
      const text = await extractTextFromFile(file);
      const cleaned = text.replace(/\s+/g, " ").trim();
      if (!cleaned) throw new Error("No text could be extracted from this file.");
      setFolderDrafts(prev => {
        const existing = prev[folderId] || { name: "", content: "" };
        const appended = existing.content ? existing.content + "\n\n---\n\n" + cleaned : cleaned;
        return { ...prev, [folderId]: { ...existing, content: appended } };
      });
    } catch (err) {
      setFolderUploadError(prev => ({ ...prev, [folderId]: err.message || "Failed to read file." }));
    }
    setFolderUploading(prev => ({ ...prev, [folderId]: false }));
  }

  async function doCreateFolder() {
    const id = 'folder_' + Date.now().toString(36);

          <div>
            <div style={{ fontSize: "16px", fontWeight: "700", color: "#4a2820" }}>My Profile</div>
            <div style={{ fontSize: "12px", color: "#9a7060", marginTop: "2px" }}>This helps the coach understand your situation</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "20px", color: "#9a7060", padding: "4px", lineHeight: 1 }}>✕</button>
        </div>

        {/* Fields */}
        <div style={{ flex: 1, overflowY: "auto", padding: "18px 20px", display: "flex", flexDirection: "column", gap: "18px" }}>
          {loading ? (
            <div style={{ color: "#c9697a", fontSize: "14px", textAlign: "center", padding: "40px 0" }}>Loading…</div>
          ) : (
            <>
              <div style={{ background: "rgba(232,147,122,0.1)", border: "1px solid rgba(200,120,90,0.2)", borderRadius: "12px", padding: "12px 14px", fontSize: "12px", color: "#7c4a3a", lineHeight: 1.6 }}>
                💡 The more you share here, the more personal and relevant the coaching will feel. Only you and Nate can see this.
              </div>

              {fields.map(f => (
                <div key={f.key}>
                  <label style={{ fontSize: "13px", fontWeight: "700", color: "#4a2820", display: "block", marginBottom: "7px" }}>{f.label}</label>
                  <textarea
                    value={draft[f.key]}
                    onChange={e => setDraft(d => ({ ...d, [f.key]: e.target.value }))}
                    placeholder={f.placeholder}
                    rows={3}
                    style={{ width: "100%", padding: "11px 14px", borderRadius: "12px", border: "1.5px solid rgba(200,120,90,0.22)", background: "rgba(255,255,255,0.88)", fontSize: "13px", fontFamily: "inherit", color: "#4a2820", outline: "none", resize: "vertical", lineHeight: 1.6, boxSizing: "border-box", transition: "border-color 0.15s" }}
                    onFocus={e => e.target.style.borderColor = "#e8937a"}
                    onBlur={e => e.target.style.borderColor = "rgba(200,120,90,0.22)"}
                  />
                </div>
              ))}

              {/* Profile completeness indicator */}
              {(() => {
                const filled = fields.filter(f => draft[f.key]?.trim()).length;
                const pct = Math.round((filled / fields.length) * 100);
                return filled > 0 ? (
                  <div style={{ padding: "10px 14px", background: "rgba(80,160,100,0.08)", border: "1px solid rgba(60,140,80,0.2)", borderRadius: "10px" }}>
                    <div style={{ fontSize: "12px", color: "#3a7a50", marginBottom: "6px", fontWeight: "600" }}>Profile {pct}% complete</div>
                    <div style={{ height: "5px", background: "rgba(80,160,100,0.15)", borderRadius: "3px", overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg,#6ac98e,#3aaa6a)", borderRadius: "3px", transition: "width 0.3s" }} />
                    </div>
                  </div>
                ) : null;
              })()}
            </>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding: "14px 20px", borderTop: "1px solid rgba(200,120,90,0.12)", background: "rgba(255,255,255,0.6)", flexShrink: 0 }}>
          <Btn onClick={save} style={{ width: "100%", padding: "13px", background: saved ? "linear-gradient(135deg,#6ac98e,#3aaa6a)" : "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", fontSize: "14px", fontWeight: "700", boxShadow: "0 4px 14px rgba(200,100,100,0.25)", transition: "background 0.3s" }}>
            {saved ? "✓ Saved!" : "Save Profile"}
          </Btn>
          <p style={{ fontSize: "11px", color: "#b89080", textAlign: "center", margin: "8px 0 0", lineHeight: 1.5 }}>Changes take effect in your next message</p>
        </div>
      </div>

      <style>{`@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}`}</style>
    </>
  );
}

// ── Client Chat ────────────────────────────────────────────────────────────────
function ClientChat({ user, onLogout }) {
  const [conversations, setConversations] = useState([]);
  const [activeConvId, setActiveConvId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [initializing, setInitializing] = useState(true);
  const [loadingMessages, setLoadingMessages] = useState(false);
  const [kb, setKb] = useState("");
  const [profile, setProfile] = useState({});
  const [showProfile, setShowProfile] = useState(false);
  const [nateSending, setNateSending] = useState(false);
  const [nateSent, setNateSent] = useState(false);
  const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [showTutorial, setShowTutorial] = useState(false);
  const [tutorialStep, setTutorialStep] = useState(0);
  const [showLogPrompt, setShowLogPrompt] = useState(false);
  const [showLogCard, setShowLogCard] = useState(false);
  const [logPromptDismissed, setLogPromptDismissed] = useState(false);
  const [exchangeCount, setExchangeCount] = useState(0);
  const [progressLogs, setProgressLogs] = useState([]);
  const [chatView, setChatView] = useState("chat");
  const [selectedMoment, setSelectedMoment] = useState(null);
  const [freeWriteNote, setFreeWriteNote] = useState("");
  const [logSaving, setLogSaving] = useState(false);
  const [logSaved, setLogSaved] = useState(false);
  const bottomRef = useRef(null);

  const TUTORIAL_STEPS = [
    {
      icon: "🌿",
      title: "Welcome to Steady Parent Coach",
      body: "This is your between-session coaching space. Before you dive in, here's a quick tour of the key features — it'll only take a minute.",
    },
    {
      icon: "⚡",
      title: "Quick Scenarios",
      body: "See the buttons at the bottom of the screen? Tap any of them to instantly start a conversation about a common situation — bedtime battles, school avoidance, meltdowns, and more. No need to type anything.",
    },
    {
      icon: "👤",
      title: "Your Profile",
      body: "Tap 'My Profile' in the top bar to tell the coach about your specific situation — what you're working on in therapy, your child's triggers, and habits you're trying to change. The more you share, the more personal the coaching feels.",
    },
    {
      icon: "📨",
      title: "Send to Nate",
      body: "At any point you can send your conversation transcript directly to Nate using the 'Send to Nate' button in the top bar. This is completely optional and only happens when you choose to share.",
    },
    {
      icon: "🗑",
      title: "Deleting Your Account",
      body: "If you ever want to remove your account and all your data, click 'Delete Account' in the top bar. You'll be asked to confirm before anything is deleted. This is permanent and cannot be undone.",
    },
  ];

  useEffect(() => {
    async function init() {
      const [convs, k, p, logs] = await Promise.all([getConversations(user.id), getKB(), getProfile(user.id), getProgress(user.id)]);
      setKb(k); setProfile(p); setProgressLogs(logs);
      if (convs.length === 0) {
        const convId = await createConversation(user.id);
        const newConv = { id: convId, user_id: user.id, preview: '', created_at: new Date().toISOString(), last_message_at: new Date().toISOString() };
        setConversations([newConv]);
        setActiveConvId(convId);
      } else {
        setConversations(convs);
      }
      setInitializing(false);
      const seen = localStorage.getItem(`spc-tutorial-${user.id}`);
      if (!seen) { setShowTutorial(true); localStorage.setItem(`spc-tutorial-${user.id}`, "1"); }
    }
    init();
  }, [user.id]);

  useEffect(() => {
    if (!activeConvId) return;
    setLoadingMessages(true);
    setExchangeCount(0);
    setShowLogPrompt(false);
    setLogPromptDismissed(false);
    setShowLogCard(false);
    setSelectedMoment(null);
    setFreeWriteNote("");
    getMessages(user.id, activeConvId).then(msgs => { setMessages(msgs); setLoadingMessages(false); });
  }, [activeConvId]);

  // Reload profile when drawer closes so system prompt stays fresh
  async function handleProfileClose() {
    setShowProfile(false);
    const p = await getProfile(user.id);
    setProfile(p);
  }

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  function buildSystemPrompt() {
    let base = `${SYSTEM_PROMPT}\n\nThe parent's name is ${user.name}. Address them by first name occasionally where it feels natural.`;

    const p = profile;
    const profileLines = [];
    if (p.working_on?.trim())    profileLines.push(`What they are currently working on in therapy: ${p.working_on.trim()}`);
    if (p.triggers?.trim())      profileLines.push(`Specific triggers or patterns to be aware of: ${p.triggers.trim()}`);
    if (p.accommodations?.trim()) profileLines.push(`Accommodation habits they are actively trying to break: ${p.accommodations.trim()}`);
    if (p.notes?.trim())         profileLines.push(`Additional context from the client: ${p.notes.trim()}`);

    if (profileLines.length > 0) {
      base += `\n\n---\n\n## Client's Personal Profile\n\nThe following information has been shared by the client about their situation. Reference it naturally and specifically where relevant — use it to make responses feel personal and connected to their actual case rather than generic:\n\n${profileLines.join("\n\n")}`;
    }

    if (kb.trim()) base += `\n\n---\n\n## Therapist's Clinical Notes\n\n${kb}`;
    return base;
  }

  async function startNewConversation() {
    const convId = await createConversation(user.id);
    const newConv = { id: convId, user_id: user.id, preview: '', created_at: new Date().toISOString(), last_message_at: new Date().toISOString() };
    setConversations(prev => [newConv, ...prev]);
    setMessages([]);
    setActiveConvId(convId);
  }

  const [logSaveError, setLogSaveError] = useState("");

  async function saveProgressLog() {
    if (!selectedMoment) return;
    setLogSaving(true);
    setLogSaveError("");
    try {
      const chatSummary = messages.find(m => m.role === 'user')?.content?.slice(0, 120) || '';
      const note = selectedMoment === 'free_write' ? freeWriteNote : '';
      await logProgress(user.id, user.username, chatSummary, selectedMoment, note);
      const logs = await getProgress(user.id);
      setProgressLogs(logs);
      setLogSaving(false);
      setLogSaved(true);
      setShowLogCard(false);
      setShowLogPrompt(false);
      setLogPromptDismissed(true);
      setSelectedMoment(null);
      setFreeWriteNote('');
      setTimeout(() => setLogSaved(false), 3000);
    } catch (e) {
      console.error('saveProgressLog error:', e);
      setLogSaveError("Couldn't save — make sure the progress_logs table exists in Supabase.");
      setLogSaving(false);
    }
  }

  async function sendMessage(text) {
    if (!text.trim() || loading) return;
    const newMsgs = [...messages, { role: "user", content: text }];
    setMessages(newMsgs); setInput(""); setLoading(true);
    try {
      const res = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: buildSystemPrompt(), messages: newMsgs }),
      });
      const data = await res.json();
      const reply = data.content?.map(b => b.text || "").join("") || "Something went wrong. Please try again.";
      const updated = [...newMsgs, { role: "assistant", content: reply }];
      setMessages(updated);
      await saveMessages(user.id, activeConvId, updated);
      const preview = newMsgs[0]?.content?.slice(0, 80) || '';
      const lastMessageAt = new Date().toISOString();
      updateConversation(activeConvId, { preview, last_message_at: lastMessageAt });
      setConversations(prev => prev.map(c => c.id === activeConvId ? { ...c, preview, last_message_at: lastMessageAt } : c));
      logUsage(user.id, user.username, text, reply);
      setExchangeCount(prev => {
        const next = prev + 1;
        if (next === 3 && !logPromptDismissed) setShowLogPrompt(true);
        return next;
      });
    } catch { setMessages([...newMsgs, { role: "assistant", content: "Connection error. Please try again." }]); }
    setLoading(false);
  }

  function exportChat() {
    const text = `Steady Parent Coach — ${user.name}\nExported: ${new Date().toLocaleString()}\n\n` + messages.map(m => `${m.role === "user" ? user.name : "Coach"}: ${m.content}`).join("\n\n");
    const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([text], { type: "text/plain" })), download: `coaching-${Date.now()}.txt` });
    a.click();
  }

  async function sendToNate() {
    if (nateSending || nateSent) return;
    setNateSending(true);
    const transcript = messages.map(m => `${m.role === "user" ? user.name : "Coach"}: ${m.content}`).join("\n\n");
    const body = `STEADY PARENT COACH — SESSION NOTES\n\nClient: ${user.name} (@${user.username})\nSent: ${new Date().toLocaleString()}\nMessages: ${messages.length}\n\n${"=".repeat(50)}\n\n${transcript}`;
    await sendEmail(`Session Notes — ${user.name}`, body, user.name);
    setNateSending(false);
    setNateSent(true);
    setTimeout(() => setNateSent(false), 3000);
  }

  async function handleDeleteAccount() {
    setDeleting(true);
    await deleteUser(user.id);
    onLogout();
  }

  const hasMessages = messages.length > 0;
  const profileFilled = Object.values(profile).some(v => v?.trim());
  const BG = "linear-gradient(145deg,#fdf6f0 0%,#fce8d8 40%,#f5e6f0 100%)";

  if (initializing || loadingMessages) return (
    <div style={{ minHeight: "100vh", background: BG, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Georgia,serif" }}>
      <div style={{ color: "#c9697a", fontSize: "14px" }}>{loadingMessages ? "Loading conversation…" : "Loading…"}</div>
    </div>
  );

  // ── Conversation List View ──────────────────────────────────────────────────
  if (!activeConvId) return (
    <div style={{ minHeight: "100vh", background: BG, fontFamily: "Georgia,serif" }}>
      <div style={{ background: "rgba(255,255,255,0.72)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(180,120,90,0.15)", padding: "13px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px" }}>🌿</div>
          <div>
            <div style={{ fontSize: "16px", fontWeight: "700", color: "#4a2820" }}>Steady Parent Coach</div>
            <div style={{ fontSize: "12px", color: "#9a7060" }}>Welcome back, {user.name.split(" ")[0]}</div>
          </div>
        </div>
        <Btn onClick={onLogout} style={{ background: "rgba(200,120,90,0.08)", color: "#9a7060", border: "1.5px solid rgba(200,120,90,0.15)", padding: "7px 13px", fontSize: "13px" }}>Sign Out</Btn>
      </div>

      <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 16px" }}>
        <Btn onClick={startNewConversation} style={{ width: "100%", padding: "14px", background: "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", fontSize: "15px", fontWeight: "700", boxShadow: "0 4px 16px rgba(200,100,100,0.25)", borderRadius: "14px", marginBottom: "24px" }}>
          + Start New Conversation
        </Btn>

        {conversations.length > 0 && (
          <div>
            <div style={{ fontSize: "13px", fontWeight: "700", color: "#9a7060", marginBottom: "12px", textTransform: "uppercase", letterSpacing: "0.05em" }}>Previous Conversations</div>
            {conversations.map(conv => (
              <div key={conv.id} style={{ background: "rgba(255,255,255,0.88)", border: "1.5px solid rgba(200,120,90,0.15)", borderRadius: "16px", padding: "16px 18px", marginBottom: "10px", boxShadow: "0 2px 10px rgba(150,80,60,0.06)" }}>
                <div style={{ fontSize: "12px", color: "#b89080", marginBottom: "6px" }}>
                  {new Date(conv.last_message_at).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" })}
                </div>
                <div style={{ fontSize: "14px", color: conv.preview ? "#4a2820" : "#b89080", lineHeight: 1.5, marginBottom: "12px", fontStyle: conv.preview ? "normal" : "italic" }}>
                  {conv.preview ? `"${conv.preview.length >= 80 ? conv.preview + "…" : conv.preview}"` : "No messages yet"}
                </div>
                <Btn onClick={() => setActiveConvId(conv.id)} style={{ background: "rgba(232,147,122,0.12)", color: "#7c4a3a", border: "1.5px solid rgba(200,120,90,0.2)", padding: "7px 16px", fontSize: "13px", fontWeight: "600" }}>
                  {conv.preview ? "Continue →" : "Open →"}
                </Btn>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  // ── Chat View ───────────────────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: BG, fontFamily: "Georgia,serif", display: "flex", flexDirection: "column" }}>
      {showProfile && <ProfileDrawer user={user} onClose={handleProfileClose} />}

      {showTutorial && (() => {
        const step = TUTORIAL_STEPS[tutorialStep];
        const isLast = tutorialStep === TUTORIAL_STEPS.length - 1;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(74,40,32,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, backdropFilter: "blur(4px)" }}>
            <div style={{ background: "linear-gradient(160deg,#fdf6f0,#fce8d8)", borderRadius: "28px", padding: "36px 32px 28px", maxWidth: 420, width: "92%", boxShadow: "0 24px 60px rgba(150,80,60,0.22)", textAlign: "center" }}>
              <div style={{ fontSize: "42px", marginBottom: "14px" }}>{step.icon}</div>
              <h2 style={{ color: "#4a2820", fontSize: "19px", margin: "0 0 12px", fontWeight: "700" }}>{step.title}</h2>
              <p style={{ color: "#7c4a3a", fontSize: "14px", lineHeight: 1.7, margin: "0 0 28px" }}>{step.body}</p>

              {/* Step dots */}
              <div style={{ display: "flex", justifyContent: "center", gap: "6px", marginBottom: "22px" }}>
                {TUTORIAL_STEPS.map((_, i) => (
                  <div key={i} style={{ width: i === tutorialStep ? 18 : 7, height: 7, borderRadius: "4px", background: i === tutorialStep ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(200,120,90,0.2)", transition: "all 0.25s" }} />
                ))}
              </div>

              <div style={{ display: "flex", gap: "10px" }}>
                {tutorialStep > 0 && (
                  <Btn onClick={() => setTutorialStep(s => s - 1)} style={{ flex: 1, background: "rgba(200,120,90,0.08)", color: "#9a7060", border: "1.5px solid rgba(200,120,90,0.2)" }}>← Back</Btn>
                )}
                <Btn onClick={() => { if (isLast) { setShowTutorial(false); } else { setTutorialStep(s => s + 1); } }}
                  style={{ flex: 1, background: "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", boxShadow: "0 4px 14px rgba(200,100,100,0.3)", fontWeight: "700" }}>
                  {isLast ? "Got it, let's go →" : "Next →"}
                </Btn>
              </div>
              <button onClick={() => setShowTutorial(false)} style={{ background: "none", border: "none", cursor: "pointer", color: "#b89080", fontSize: "12px", marginTop: "14px", fontFamily: "inherit" }}>Skip tutorial</button>
            </div>
          </div>
        );
      })()}

      {showLogCard && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(74,40,32,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, backdropFilter: "blur(4px)" }}>
          <div style={{ background: "linear-gradient(160deg,#fdf6f0,#fce8d8)", borderRadius: "28px", padding: "28px 24px 24px", maxWidth: 420, width: "92%", boxShadow: "0 24px 60px rgba(150,80,60,0.22)" }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: "16px" }}>
              <div>
                <div style={{ fontSize: "18px", fontWeight: "700", color: "#4a2820" }}>Log this moment</div>
                {messages.find(m => m.role === 'user') && (
                  <div style={{ fontSize: "12px", color: "#9a7060", marginTop: "5px", fontStyle: "italic", lineHeight: 1.5 }}>
                    "{messages.find(m => m.role === 'user').content.slice(0, 80)}{messages.find(m => m.role === 'user').content.length > 80 ? '…' : ''}"
                  </div>
                )}
              </div>
              <button onClick={() => { setShowLogCard(false); setLogPromptDismissed(true); setSelectedMoment(null); setFreeWriteNote(''); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "18px", color: "#b89080", padding: "2px 2px 2px 10px", flexShrink: 0 }}>✕</button>
            </div>
            <div style={{ fontSize: "13px", color: "#7c4a3a", marginBottom: "12px", fontWeight: "600" }}>How did it go?</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "9px", marginBottom: "14px" }}>
              {[
                { type: "held_firm", icon: "💪", label: "I held firm" },
                { type: "gave_in_caught_myself", icon: "😅", label: "Gave in, caught myself" },
                { type: "kid_win", icon: "🌟", label: "Kid had a win" },
                { type: "free_write", icon: "✍️", label: "Free write" },
              ].map(opt => (
                <button key={opt.type} onClick={() => setSelectedMoment(selectedMoment === opt.type ? null : opt.type)}
                  style={{ background: selectedMoment === opt.type ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(255,255,255,0.88)", color: selectedMoment === opt.type ? "#fff" : "#7c4a3a", border: `1.5px solid ${selectedMoment === opt.type ? "transparent" : "rgba(200,120,90,0.2)"}`, borderRadius: "14px", padding: "14px 10px", fontSize: "13px", fontWeight: "600", cursor: "pointer", fontFamily: "inherit", textAlign: "center", transition: "all 0.15s", display: "flex", flexDirection: "column", alignItems: "center", gap: "6px" }}>
                  <span style={{ fontSize: "22px" }}>{opt.icon}</span>
                  <span>{opt.label}</span>
                </button>
              ))}
            </div>
            {selectedMoment === 'free_write' && (
              <textarea value={freeWriteNote} onChange={e => setFreeWriteNote(e.target.value)}
                placeholder="Write a sentence or two about what happened…" rows={3}
                style={{ width: "100%", padding: "11px 14px", borderRadius: "12px", border: "1.5px solid rgba(200,120,90,0.25)", fontSize: "13px", fontFamily: "inherit", color: "#4a2820", outline: "none", resize: "none", lineHeight: 1.6, boxSizing: "border-box", background: "rgba(255,255,255,0.92)", marginBottom: "12px" }} />
            )}
            {logSaveError && <div style={{ background: "rgba(220,80,80,0.08)", border: "1px solid rgba(220,80,80,0.2)", borderRadius: "10px", padding: "9px 13px", color: "#c05060", fontSize: "12px", marginBottom: "10px", lineHeight: 1.5 }}>{logSaveError}</div>}
            <Btn onClick={saveProgressLog} disabled={!selectedMoment || logSaving}
              style={{ width: "100%", padding: "13px", background: selectedMoment && !logSaving ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(200,120,90,0.2)", color: selectedMoment && !logSaving ? "#fff" : "#b89080", border: "none", fontSize: "14px", fontWeight: "700", boxShadow: selectedMoment ? "0 4px 14px rgba(200,100,100,0.25)" : "none", transition: "all 0.2s" }}>
              {logSaving ? "Saving…" : "Save"}
            </Btn>
          </div>
        </div>
      )}

      {showDeleteConfirm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(74,40,32,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, backdropFilter: "blur(4px)" }} onClick={() => setShowDeleteConfirm(false)}>
          <div style={{ background: "#fff8f5", borderRadius: "24px", padding: "32px", maxWidth: 380, width: "92%", boxShadow: "0 20px 60px rgba(150,80,60,0.2)", textAlign: "center" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontSize: "32px", marginBottom: "10px" }}>⚠️</div>
            <h3 style={{ color: "#4a2820", margin: "0 0 10px", fontSize: "18px" }}>Delete Account?</h3>
            <p style={{ color: "#7c4a3a", fontSize: "13px", lineHeight: 1.65, margin: "0 0 24px" }}>
              This will permanently delete your account, all chat history, and your profile. This cannot be undone.
            </p>
            <div style={{ display: "flex", gap: "10px" }}>
              <Btn onClick={() => setShowDeleteConfirm(false)} style={{ flex: 1, background: "rgba(200,120,90,0.08)", color: "#9a7060", border: "1.5px solid rgba(200,120,90,0.2)" }}>Cancel</Btn>
              <Btn onClick={handleDeleteAccount} disabled={deleting} style={{ flex: 1, background: deleting ? "rgba(220,80,80,0.3)" : "linear-gradient(135deg,#e05060,#c03050)", color: "#fff", border: "none", boxShadow: "0 4px 14px rgba(200,60,80,0.25)" }}>
                {deleting ? "Deleting…" : "Yes, Delete"}
              </Btn>
            </div>
          </div>
        </div>
      )}

      <div style={{ background: "rgba(255,255,255,0.72)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(180,120,90,0.15)", padding: "13px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
          <button onClick={() => { setActiveConvId(null); setMessages([]); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#9a7060", fontSize: "13px", fontWeight: "600", fontFamily: "inherit", padding: "4px 8px 4px 0", display: "flex", alignItems: "center", gap: "3px" }}>← All</button>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px" }}>🌿</div>
          <div>
            <div style={{ fontSize: "16px", fontWeight: "700", color: "#4a2820" }}>Steady Parent Coach</div>
            <div style={{ fontSize: "12px", color: "#9a7060" }}>Welcome back, {user.name.split(" ")[0]}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: "7px", alignItems: "center" }}>
          {/* Profile button with dot indicator if empty */}
          <button onClick={() => setShowProfile(true)} style={{ position: "relative", background: profileFilled ? "rgba(232,147,122,0.12)" : "rgba(220,80,80,0.07)", border: `1.5px solid ${profileFilled ? "rgba(200,120,90,0.25)" : "rgba(220,80,80,0.2)"}`, borderRadius: "10px", padding: "7px 13px", fontSize: "13px", color: profileFilled ? "#7c4a3a" : "#c05060", cursor: "pointer", fontFamily: "inherit", fontWeight: "600", transition: "all 0.2s" }}>
            {profileFilled ? "👤 My Profile" : "👤 Add Profile"}
            {!profileFilled && <span style={{ position: "absolute", top: -3, right: -3, width: 8, height: 8, borderRadius: "50%", background: "#e8937a", border: "1.5px solid #fdf6f0" }} />}
          </button>
          <Btn onClick={() => setChatView(v => v === "progress" ? "chat" : "progress")} style={{ background: chatView === "progress" ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(200,120,90,0.08)", color: chatView === "progress" ? "#fff" : "#9a7060", border: "1.5px solid rgba(200,120,90,0.15)", padding: "7px 13px", fontSize: "13px", position: "relative" }}>
            📈 Progress
            {logSaved && <span style={{ position: "absolute", top: -4, right: -4, width: 9, height: 9, borderRadius: "50%", background: "#3aaa6a", border: "1.5px solid #fdf6f0" }} />}
          </Btn>
          {hasMessages && chatView === "chat" && <>
            <Btn onClick={exportChat} style={{ background: "#fff8f5", color: "#c9697a", border: "1.5px solid rgba(200,100,100,0.18)", padding: "7px 13px", fontSize: "13px" }}>💾 Export</Btn>
            <Btn onClick={sendToNate} disabled={nateSending || nateSent} style={{ background: nateSent ? "rgba(80,180,100,0.15)" : "#fff8f5", color: nateSent ? "#2a7a40" : "#c9697a", border: `1.5px solid ${nateSent ? "rgba(60,160,80,0.3)" : "rgba(200,100,100,0.18)"}`, padding: "7px 13px", fontSize: "13px", transition: "all 0.3s" }}>
              {nateSending ? "Sending…" : nateSent ? "✓ Sent to Nate" : "📨 Send to Nate"}
            </Btn>
          </>}
          <Btn onClick={onLogout} style={{ background: "rgba(200,120,90,0.08)", color: "#9a7060", border: "1.5px solid rgba(200,120,90,0.15)", padding: "7px 13px", fontSize: "13px" }}>Sign Out</Btn>
          <Btn onClick={() => setShowDeleteConfirm(true)} style={{ background: "rgba(220,80,80,0.06)", color: "#c05060", border: "1.5px solid rgba(220,80,80,0.18)", padding: "7px 13px", fontSize: "13px" }}>Delete Account</Btn>
        </div>
      </div>

      {chatView === "progress" && (() => {
        const MOMENT_LABELS = {
          held_firm: { label: "Held firm", icon: "💪", color: "#3a7a50", bg: "rgba(80,160,100,0.15)" },
          gave_in_caught_myself: { label: "Gave in — caught myself", icon: "😅", color: "#8a6020", bg: "rgba(220,180,60,0.15)" },
          kid_win: { label: "Kid had a win", icon: "🌟", color: "#7a4a8a", bg: "rgba(180,100,220,0.12)" },
          free_write: { label: "Free write", icon: "✍️", color: "#4a6080", bg: "rgba(100,140,200,0.12)" },
        };
        const thisWeek = progressLogs.filter(l => Date.now() - new Date(l.created_at) < 7*24*60*60*1000).length;
        const typeCounts = {}; for (const l of progressLogs) typeCounts[l.moment_type] = (typeCounts[l.moment_type]||0)+1;
        const topType = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
        // Group by week
        const weekMap = {};
        for (const log of progressLogs) {
          const d = new Date(log.created_at);
          const ws = new Date(d); ws.setDate(d.getDate()-d.getDay()); ws.setHours(0,0,0,0);
          const key = ws.toISOString();
          if (!weekMap[key]) weekMap[key] = { start: ws, logs: [] };
          weekMap[key].logs.push(log);
        }
        const weeks = Object.values(weekMap).sort((a,b) => b.start - a.start);
        const now = new Date();
        const thisWS = new Date(now); thisWS.setDate(now.getDate()-now.getDay()); thisWS.setHours(0,0,0,0);
        const lastWS = new Date(thisWS); lastWS.setDate(thisWS.getDate()-7);
        return (
          <div style={{ flex: 1, maxWidth: 720, width: "100%", margin: "0 auto", padding: "22px 15px", display: "flex", flexDirection: "column", gap: "18px" }}>
            <Btn onClick={() => { setShowLogCard(true); }} style={{ width: "100%", padding: "13px", background: "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", fontSize: "14px", fontWeight: "700", boxShadow: "0 4px 16px rgba(200,100,100,0.25)", borderRadius: "14px" }}>
              + Log a Moment
            </Btn>
            <div style={{ background: "rgba(255,255,255,0.82)", borderRadius: "18px", padding: "20px 24px", border: "1.5px solid rgba(200,120,90,0.15)", display: "flex", gap: "0", alignItems: "stretch" }}>
              {[
                { value: progressLogs.length, label: "moments logged" },
                { value: thisWeek, label: "this week" },
                { value: topType ? (MOMENT_LABELS[topType]?.icon || "📝") : "—", label: "top moment", raw: true },
              ].map((s, i) => (
                <div key={i} style={{ flex: 1, textAlign: "center", padding: "0 8px", borderLeft: i > 0 ? "1px solid rgba(200,120,90,0.15)" : "none" }}>
                  <div style={{ fontSize: s.raw ? "26px" : "28px", fontWeight: s.raw ? "400" : "700", color: "#4a2820", lineHeight: 1.1 }}>{s.value}</div>
                  <div style={{ fontSize: "11px", color: "#9a7060", marginTop: "5px" }}>{s.label}</div>
                </div>
              ))}
            </div>
            {progressLogs.length === 0 ? (
              <div style={{ background: "rgba(255,255,255,0.82)", borderRadius: "18px", padding: "40px 24px", textAlign: "center", border: "1.5px solid rgba(200,120,90,0.15)" }}>
                <div style={{ fontSize: "34px", marginBottom: "12px" }}>🌱</div>
                <div style={{ fontSize: "15px", fontWeight: "600", color: "#4a2820", marginBottom: "8px" }}>No moments logged yet</div>
                <div style={{ fontSize: "13px", color: "#9a7060", lineHeight: 1.65 }}>After 3 back-and-forths with the coach, you'll see a prompt to log how the moment went.</div>
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: "22px" }}>
                {weeks.map(week => {
                  const wLabel = week.start >= thisWS ? "This week" : week.start >= lastWS ? "Last week" : week.start.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                  return (
                    <div key={week.start.toISOString()}>
                      <div style={{ fontSize: "12px", fontWeight: "700", color: "#9a7060", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: "10px" }}>{wLabel}</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                        {week.logs.map(log => {
                          const m = MOMENT_LABELS[log.moment_type] || { label: log.moment_type, icon: "📝", color: "#6a5040", bg: "rgba(200,150,100,0.1)" };
                          return (
                            <div key={log.id} style={{ background: "rgba(255,255,255,0.88)", border: `1.5px solid ${m.bg}`, borderRadius: "14px", padding: "13px 16px", display: "flex", gap: "12px", alignItems: "flex-start" }}>
                              <div style={{ fontSize: "22px", flexShrink: 0, marginTop: "1px" }}>{m.icon}</div>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontSize: "14px", fontWeight: "600", color: m.color, marginBottom: "3px" }}>{m.label}</div>
                                {log.chat_summary && <div style={{ fontSize: "12px", color: "#9a7060", lineHeight: 1.5, marginBottom: log.note ? "5px" : 0, fontStyle: "italic" }}>"{log.chat_summary.length > 80 ? log.chat_summary.slice(0,80)+"…" : log.chat_summary}"</div>}
                                {log.note && <div style={{ fontSize: "13px", color: "#4a2820", lineHeight: 1.55 }}>{log.note}</div>}
                              </div>
                              <div style={{ fontSize: "11px", color: "#b89080", flexShrink: 0 }}>{new Date(log.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {chatView === "chat" && <div style={{ flex: 1, maxWidth: 720, width: "100%", margin: "0 auto", padding: "22px 15px", display: "flex", flexDirection: "column", gap: "18px" }}>
        {!hasMessages && (
          <div style={{ textAlign: "center", paddingTop: "10px" }}>
            <div style={{ fontSize: "26px", marginBottom: "6px" }}>🌿</div>
            <h2 style={{ color: "#4a2820", fontSize: "21px", margin: "0 0 6px", fontWeight: "700" }}>What's happening right now?</h2>
            <p style={{ color: "#9a7060", fontSize: "14px", margin: "0 0 20px", lineHeight: 1.6 }}>Describe what's going on, or tap a common situation below.</p>
            {!profileFilled && (
              <div onClick={() => setShowProfile(true)} style={{ display: "inline-flex", alignItems: "center", gap: "8px", background: "rgba(232,147,122,0.1)", border: "1.5px dashed rgba(200,120,90,0.35)", borderRadius: "12px", padding: "10px 18px", marginBottom: "18px", cursor: "pointer", transition: "all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(232,147,122,0.18)"}
                onMouseLeave={e => e.currentTarget.style.background = "rgba(232,147,122,0.1)"}
              >
                <span style={{ fontSize: "16px" }}>👤</span>
                <span style={{ fontSize: "13px", color: "#7c4a3a", fontWeight: "600" }}>Add your profile to personalize the coaching</span>
                <span style={{ fontSize: "12px", color: "#c9697a" }}>→</span>
              </div>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(185px,1fr))", gap: "9px" }}>
              {SCENARIOS.map(s => (
                <button key={s.label} onClick={() => sendMessage(s.prompt)} style={{ background: "rgba(255,255,255,0.82)", border: "1.5px solid rgba(200,120,90,0.2)", borderRadius: "14px", padding: "13px 14px", fontSize: "13px", color: "#7c4a3a", cursor: "pointer", textAlign: "left", fontFamily: "inherit", lineHeight: 1.4, transition: "all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,240,230,0.95)"; e.currentTarget.style.borderColor = "#e8937a"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.82)"; e.currentTarget.style.borderColor = "rgba(200,120,90,0.2)"; }}
                >{s.label}</button>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: "flex", flexDirection: "column", gap: "13px" }}>
          {messages.map((m, i) => (
            <div key={i} style={{ display: "flex", justifyContent: m.role === "user" ? "flex-end" : "flex-start" }}>
              {m.role === "assistant" && <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px", marginRight: "8px", flexShrink: 0, marginTop: 2 }}>🌿</div>}
              <div style={{ maxWidth: "82%", padding: "12px 15px", borderRadius: m.role === "user" ? "17px 17px 4px 17px" : "4px 17px 17px 17px", background: m.role === "user" ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(255,255,255,0.88)", color: m.role === "user" ? "#fff" : "#4a2820", fontSize: "14px", lineHeight: 1.65, boxShadow: m.role === "user" ? "0 3px 12px rgba(200,100,100,0.2)" : "0 2px 10px rgba(150,80,60,0.08)", border: m.role === "assistant" ? "1px solid rgba(200,120,90,0.1)" : "none" }}>
                {m.role === "assistant" ? formatMessage(m.content) : m.content}
              </div>
            </div>
          ))}
          {loading && (
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg,#e8937a,#c9697a)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "13px" }}>🌿</div>
              <div style={{ background: "rgba(255,255,255,0.88)", padding: "12px 16px", borderRadius: "4px 17px 17px 17px", boxShadow: "0 2px 10px rgba(150,80,60,0.08)", border: "1px solid rgba(200,120,90,0.1)" }}>
                <div style={{ display: "flex", gap: "4px" }}>{[0,1,2].map(j => <div key={j} style={{ width: 6, height: 6, borderRadius: "50%", background: "#e8937a", animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${j*0.2}s` }} />)}</div>
              </div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>

        {showLogPrompt && !showLogCard && (
          <div style={{ display: "flex", alignItems: "center", gap: "10px", background: "rgba(255,255,255,0.88)", border: "1.5px solid rgba(200,120,90,0.22)", borderRadius: "14px", padding: "11px 15px", marginTop: "-6px" }}>
            <span style={{ fontSize: "18px" }}>📝</span>
            <div style={{ flex: 1, fontSize: "13px", color: "#7c4a3a", fontWeight: "500" }}>Want to log how this moment went?</div>
            <button onClick={() => { setShowLogCard(true); setShowLogPrompt(false); }} style={{ background: "linear-gradient(135deg,#e8937a,#c9697a)", color: "#fff", border: "none", borderRadius: "10px", padding: "7px 14px", fontSize: "13px", fontWeight: "600", cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>Log it →</button>
            <button onClick={() => { setShowLogPrompt(false); setLogPromptDismissed(true); }} style={{ background: "none", border: "none", cursor: "pointer", color: "#b89080", fontSize: "16px", padding: "2px" }}>✕</button>
          </div>
        )}

        {logSaved && (
          <div style={{ display: "flex", alignItems: "center", gap: "9px", background: "rgba(80,160,100,0.12)", border: "1.5px solid rgba(60,140,80,0.25)", borderRadius: "14px", padding: "11px 15px" }}>
            <span style={{ fontSize: "16px" }}>✅</span>
            <div style={{ fontSize: "13px", color: "#3a7a50", fontWeight: "500" }}>Moment logged! View it in the Progress tab.</div>
          </div>
        )}

        {hasMessages && (
          <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
            {SCENARIOS.map(s => (
              <button key={s.label} onClick={() => sendMessage(s.prompt)} style={{ background: "rgba(255,255,255,0.7)", border: "1px solid rgba(200,120,90,0.17)", borderRadius: "20px", padding: "5px 12px", fontSize: "12px", color: "#7c4a3a", cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(255,240,230,0.95)"}
                onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,0.7)"}
              >{s.label}</button>
            ))}
          </div>
        )}
      </div>}

      {chatView === "chat" && <div style={{ position: "sticky", bottom: 0, background: "rgba(253,246,240,0.93)", backdropFilter: "blur(16px)", borderTop: "1px solid rgba(180,120,90,0.11)", padding: "13px 15px" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", display: "flex", gap: "9px", alignItems: "flex-end" }}>
          <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input); } }} placeholder="Describe what's happening right now…" rows={1}
            style={{ flex: 1, padding: "11px 15px", borderRadius: "18px", border: "1.5px solid rgba(200,120,90,0.2)", background: "rgba(255,255,255,0.92)", fontSize: "14px", fontFamily: "inherit", color: "#4a2820", resize: "none", outline: "none", lineHeight: 1.5, maxHeight: "110px", overflow: "auto", transition: "border-color 0.15s" }}
            onFocus={e => e.target.style.borderColor = "#e8937a"} onBlur={e => e.target.style.borderColor = "rgba(200,120,90,0.2)"} />
          <button onClick={() => sendMessage(input)} disabled={!input.trim() || loading} style={{ width: 42, height: 42, borderRadius: "50%", background: input.trim() && !loading ? "linear-gradient(135deg,#e8937a,#c9697a)" : "rgba(200,120,90,0.17)", border: "none", cursor: input.trim() && !loading ? "pointer" : "default", fontSize: "17px", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", flexShrink: 0 }}>➤</button>
        </div>
        <div style={{ maxWidth: 720, margin: "6px auto 0", textAlign: "center", fontSize: "11px", color: "#b89080" }}>Not a replacement for therapy · For crisis support, contact emergency services</div>
      </div>}

      <style>{`
        @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
        @keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
        *{box-sizing:border-box}
        textarea::placeholder{color:#c4a090}
      `}</style>
    </div>
  );
}

// ── Root ───────────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [pendingConsent, setPendingConsent] = useState(null);

  if (pendingConsent) {
    return <ConsentScreen user={pendingConsent} onConsented={() => { setUser(pendingConsent); setPendingConsent(null); }} />;
  }
  if (!user) return <AuthScreen onLogin={setUser} onNeedsConsent={setPendingConsent} />;
  if (user.role === "admin") return <AdminDashboard onLogout={() => setUser(null)} />;
  return <ClientChat user={user} onLogout={() => setUser(null)} />;
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
